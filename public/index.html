<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>budget-thing</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#d97757" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="budget-thing" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- Login screen -->
  <div class="login-screen hidden" id="login-screen">
    <div class="login-box">
      <img src="/favicon.png" width="48" height="48" alt="budget-thing" class="login-logo" />
      <h1 class="login-title">budget-thing</h1>
      <p class="login-subtitle">Connecte-toi pour accéder</p>
      <form class="login-form" id="login-form">
        <input type="text" id="login-username" class="login-input" placeholder="Nom d'utilisateur" autocomplete="username" autocapitalize="none" />
        <input type="password" id="login-password" class="login-input" placeholder="Mot de passe" autocomplete="current-password" />
        <button type="submit" class="btn-primary login-btn">Accéder</button>
      </form>
      <p class="login-error hidden" id="login-error"></p>
    </div>
  </div>

  <!-- App -->
  <div class="app-layout hidden" id="app-layout">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-start">
        <img src="/favicon.png" width="18" height="18" alt="" class="brand-logo" />
        <span class="brand-name">budget-thing</span>
      </div>
      <div class="topbar-end">
        <span class="topbar-username" id="topbar-username"></span>
        <button class="btn-logout" id="btn-logout" title="Déconnexion">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg>
        </button>
      </div>
    </header>

    <!-- Main content -->
    <main class="main-content">

      <!-- Hero row: roulement + bilan -->
      <div class="hero-row">
        <div class="hero-roulement">
          <div class="hero-sup">ROULEMENT</div>
          <div class="hero-amount" id="hero-amount">—</div>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-bar-fill"></div>
          </div>
          <div class="progress-label" id="progress-bar-label"></div>
        </div>

        <div class="hero-bilan">
          <div class="bilan-title">BILAN DU MOIS</div>
          <div class="bilan-rows">
            <div class="bilan-row">
              <span class="bilan-label">Revenus</span>
              <span class="bilan-value bilan-positive" id="sum-revenus">—</span>
            </div>
            <div class="bilan-row">
              <span class="bilan-label">Dépenses communes</span>
              <span class="bilan-value" id="sum-communes">—</span>
            </div>
            <div class="bilan-row">
              <span class="bilan-label">Dépenses fixes</span>
              <span class="bilan-value" id="sum-fixes">—</span>
            </div>
            <div class="bilan-row">
              <span class="bilan-label">Annuelles ÷ 12</span>
              <span class="bilan-value" id="sum-annuelles">—</span>
            </div>
            <div class="bilan-row bilan-row-total">
              <span class="bilan-label">Total dépenses</span>
              <span class="bilan-value bilan-negative" id="sum-depenses">—</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Mobile mini-stats (hidden on desktop) -->
      <div class="mini-stats">
        <div class="mini-stat">
          <span class="mini-label">Revenus</span>
          <span class="mini-value mini-positive" id="mini-revenus">—</span>
        </div>
        <div class="mini-stat">
          <span class="mini-label">Dépenses</span>
          <span class="mini-value mini-negative" id="mini-depenses">—</span>
        </div>
      </div>

      <!-- Sections grid -->
      <div class="sections-grid">
        <div class="budget-section" id="section-revenus"></div>
        <div class="budget-section" id="section-depenses_communes"></div>
        <div class="budget-section" id="section-depenses_fixes"></div>
        <div class="budget-section" id="section-depenses_annuelles"></div>
      </div>

    </main>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop hidden" id="modal">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title"></h2>
      </div>
      <form class="modal-body" id="modal-form"></form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
